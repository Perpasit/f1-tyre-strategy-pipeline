version: 2

models:
  - name: silver_f1_laps_clean
    columns:
      - name: raceyear
        tests:
          - not_null

      - name: grandprix
        tests:
          - not_null

      - name: sessiontype
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['R', 'Q', 'FP1', 'FP2', 'FP3', 'S']

      - name: driver
        tests:
          - not_null

      - name: lapnumber
        tests:
          - not_null

      - name: laptime
        tests:
          - not_null

      - name: compound
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SOFT', 'MEDIUM', 'HARD', 'INTERMEDIATE', 'WET']

      - name: stint
        tests:
          - not_null